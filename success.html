<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Sent — BenBees Property Services</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --ink: #1a1a18; --cream: #f5f0e8; --gold: #c8973a; --muted: #7a7060; --white: #ffffff; }
    body { font-family: 'DM Sans', sans-serif; background: var(--ink); color: var(--white); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
    .icon { font-size: 4rem; margin-bottom: 2rem; animation: pop 0.5s ease; }
    @keyframes pop { 0% { transform: scale(0); opacity: 0; } 80% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 300; margin-bottom: 1rem; }
    h1 em { font-style: italic; color: var(--gold); }
    p { font-size: 1rem; font-weight: 300; color: rgba(255,255,255,0.6); line-height: 1.8; max-width: 480px; margin-bottom: 3rem; }
    a { display: inline-block; padding: 0.9rem 2.5rem; background: var(--gold); color: var(--white); font-size: 0.78rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; text-decoration: none; transition: background 0.2s; }
    a:hover { background: #e6b85c; }
    .logo { position: absolute; top: 2rem; left: 50%; transform: translateX(-50%); font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 600; color: rgba(255,255,255,0.4); text-decoration: none; }
    .logo span { color: var(--gold); }
  </style>
</head>
<body>
  <a class="logo" href="/">Ben<span>Bees</span></a>
  <div class="icon">✓</div>
  <h1>Message <em>received!</em></h1>
  <p>Thank you for getting in touch. We've received your enquiry and will be back in touch with you shortly. A confirmation has been sent to your email.</p>
  <a href="/">Back to Website</a>
</body>
</html>
